services:
  postgres:
    image: postgres:16-alpine
    container_name: focusos-postgres
    environment:
      POSTGRES_DB: focusos_db
      POSTGRES_USER: focusos_user
      POSTGRES_PASSWORD: focusos_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: focusos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
