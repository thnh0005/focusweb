name: focusos

x-backend-environment: &backend-environment
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-me}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
  DEBUG: ${DEBUG:-True}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  EXTENSION_ALLOWED_ORIGINS: ${EXTENSION_ALLOWED_ORIGINS:-}
  DATABASE_ENGINE: ${DATABASE_ENGINE:-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-focusos}
  POSTGRES_USER: ${POSTGRES_USER:-focusos}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-focusos}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
  AI_PROVIDER: ${AI_PROVIDER:-openrouter}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GROQ_MODEL: ${GROQ_MODEL:-}
  GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
  DOCUMENT_SUMMARY_MODEL: ${DOCUMENT_SUMMARY_MODEL:-${OPENROUTER_MODEL:-}}
  FLASHCARD_GENERATION_MODEL: ${FLASHCARD_GENERATION_MODEL:-${OPENROUTER_MODEL:-}}
  AI_MAX_REQUEST_TOKENS: ${AI_MAX_REQUEST_TOKENS:-3700}
  AI_TARGET_REQUEST_TOKENS: ${AI_TARGET_REQUEST_TOKENS:-3500}
  AI_CHUNK_OUTPUT_RESERVE_TOKENS: ${AI_CHUNK_OUTPUT_RESERVE_TOKENS:-650}
  AI_REDUCTION_OUTPUT_RESERVE_TOKENS: ${AI_REDUCTION_OUTPUT_RESERVE_TOKENS:-700}
  AI_SUMMARY_OUTPUT_RESERVE_TOKENS: ${AI_SUMMARY_OUTPUT_RESERVE_TOKENS:-500}
  AI_KEY_POINTS_SUMMARY_OUTPUT_RESERVE_TOKENS: ${AI_KEY_POINTS_SUMMARY_OUTPUT_RESERVE_TOKENS:-800}
  AI_DETAILED_SUMMARY_OUTPUT_RESERVE_TOKENS: ${AI_DETAILED_SUMMARY_OUTPUT_RESERVE_TOKENS:-1200}
  AI_FLASHCARD_OUTPUT_RESERVE_TOKENS: ${AI_FLASHCARD_OUTPUT_RESERVE_TOKENS:-1100}
  AI_CONTEXT_SUMMARY_MAX_TOKENS: ${AI_CONTEXT_SUMMARY_MAX_TOKENS:-450}
  AI_ENTITY_MEMORY_MAX_TOKENS: ${AI_ENTITY_MEMORY_MAX_TOKENS:-250}
  AI_CHUNK_OVERLAP_TOKENS: ${AI_CHUNK_OVERLAP_TOKENS:-120}
  AI_MIN_CURRENT_CHUNK_TOKENS: ${AI_MIN_CURRENT_CHUNK_TOKENS:-300}
  AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-30}
  AI_MAX_RETRIES: ${AI_MAX_RETRIES:-0}
  AI_RETRY_BACKOFF_SECONDS: ${AI_RETRY_BACKOFF_SECONDS:-2}
  AI_CIRCUIT_FAILURE_THRESHOLD: ${AI_CIRCUIT_FAILURE_THRESHOLD:-5}
  AI_CIRCUIT_COOLDOWN_SECONDS: ${AI_CIRCUIT_COOLDOWN_SECONDS:-120}
  AI_SEMANTIC_REALTIME_ENABLED: ${AI_SEMANTIC_REALTIME_ENABLED:-false}
  DOCUMENT_EXTRACTION_STALE_SECONDS: ${DOCUMENT_EXTRACTION_STALE_SECONDS:-900}
  DOCUMENT_UPLOADED_GRACE_SECONDS: ${DOCUMENT_UPLOADED_GRACE_SECONDS:-120}
  DOCUMENT_EXTRACTION_MAX_RECOVERY_ATTEMPTS: ${DOCUMENT_EXTRACTION_MAX_RECOVERY_ATTEMPTS:-2}
  AI_JOB_STALE_PROCESSING_SECONDS: ${AI_JOB_STALE_PROCESSING_SECONDS:-900}
  AI_JOB_MAX_RECOVERY_ATTEMPTS: ${AI_JOB_MAX_RECOVERY_ATTEMPTS:-2}
  AI_STALE_RECOVERY_INTERVAL_SECONDS: ${AI_STALE_RECOVERY_INTERVAL_SECONDS:-300}
  AI_QUOTA_DEFER_MAX_RETRIES: ${AI_QUOTA_DEFER_MAX_RETRIES:-120}
  AI_RATE_LIMITER_ENABLED: ${AI_RATE_LIMITER_ENABLED:-True}
  AI_RATE_LIMITER_REDIS_URL: ${AI_RATE_LIMITER_REDIS_URL:-redis://redis:6379/0}
  AI_RATE_LIMITER_FAIL_OPEN: ${AI_RATE_LIMITER_FAIL_OPEN:-False}
  AI_PROVIDER_TOKEN_LIMIT_PER_MINUTE: ${AI_PROVIDER_TOKEN_LIMIT_PER_MINUTE:-6000}
  AI_PROVIDER_REQUEST_LIMIT_PER_MINUTE: ${AI_PROVIDER_REQUEST_LIMIT_PER_MINUTE:-30}
  AI_RATE_LIMITER_SAFETY_MARGIN: ${AI_RATE_LIMITER_SAFETY_MARGIN:-0.15}
  AI_RATE_LIMITER_FALLBACK_BACKOFF_SECONDS: ${AI_RATE_LIMITER_FALLBACK_BACKOFF_SECONDS:-60}
  AI_RATE_LIMITER_JITTER_SECONDS: ${AI_RATE_LIMITER_JITTER_SECONDS:-5}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
  CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
  MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
  STATIC_ROOT: ${STATIC_ROOT:-/app/staticfiles}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-focusos}
      POSTGRES_USER: ${POSTGRES_USER:-focusos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-focusos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "1"
      COLLECTSTATIC: ${COLLECTSTATIC:-0}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/auth/csrf/', timeout=2)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  celery_worker:
    build:
      context: ./backend
    command: celery -A config worker -l info
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "0"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_ai_worker:
    build:
      context: ./backend
    command: celery -A config worker -l info -Q ai_provider --concurrency=${AI_PROVIDER_WORKER_CONCURRENCY:-1}
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "0"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
    command: celery -A config beat -l info --schedule=/app/celerybeat-schedule/celerybeat-schedule
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "0"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - celery_beat_data:/app/celerybeat-schedule
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./focusos
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_MOCK_AUTH: ${NEXT_PUBLIC_MOCK_AUTH:-false}
      NEXT_PUBLIC_EXTENSION_ID: ${NEXT_PUBLIC_EXTENSION_ID:-}
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./focusos:/app
      - focusos_node_modules:/app/node_modules
      - focusos_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_media:
  backend_static:
  celery_beat_data:
  focusos_node_modules:
  focusos_next:
